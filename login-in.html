<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kisan Shathi - SignUp page</title>
    <link rel="icon" type="image/png" sizes="256x256" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container-fluid">
        <div class="text-center mt-2">
            <img src="images/logo.png" width="100" class="img-fluid" alt="">
        </div>
        <h1 class="text-center">Kisan Shathi</h1>
        <div class="row d-flex align-items-center justify-content-center" style="height : 380px;">
            <div class="col-lg-4 col-md-5 col-sm-6 col-10 col-xl-3 ps-3 pe-3 p-1 rounded-4 login-box d-flex flex-column justify-content-evenly">
                <h2 class="fw-bolder text-center">Sign In</h2>
                <form action="script.js" class="mt-1">
                    <div>
                        <input type="email" class="form-control mb-3" id="exampleFormControlInput1" placeholder="email/mobile number">
                        <input type="password" placeholder="password" id="inputPassword5" class="form-control mb-3" aria-describedby="passwordHelpBlock">
                        <div id="passwordHelpBlock" class="form-text">
                        Your password must be 8-12 characters long, and must not contain spaces, special characters, or emoji. <a href="">forgot password?</a>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button class="btn login-btn text-white fw-bold mt-4" type="button">Login</button>
                    </div>
                    <p class="mt-2">Create a new acoount? <a href="signUp.html"> Sign Up </a></p>
                </form>
            </div>
        </div>
    </div>
    <footer class="d-flex align-items-center justify-content-center bg-success text-center text-white" >Copyright @ Kisan shathi</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
